{% extends "base.html" %}

{% block content %}
<section class="error-section">
    <div class="error-container">
        <h1>❌ Error</h1>
        <div class="error-message">
            <p>{{ error_message }}</p>
        </div>
        <div class="error-actions">
            <a href="/" class="btn btn-primary">← Back to Home</a>
            <a href="/" class="btn btn-secondary">Try Again</a>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_css %}
<style>
.error-section {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 400px;
}

.error-container {
    background: #fff5f5;
    border: 2px solid #fc8181;
    border-radius: 8px;
    padding: 40px;
    text-align: center;
    max-width: 500px;
}

.error-container h1 {
    color: #c53030;
    margin-bottom: 20px;
}

.error-message {
    background: white;
    border-left: 4px solid #fc8181;
    padding: 20px;
    border-radius: 4px;
    margin-bottom: 20px;
    text-align: left;
    font-family: monospace;
    font-size: 14px;
    color: #742a2a;
}

.error-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
}
</style>
{% endblock %}
